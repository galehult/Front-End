<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 100" width="100%" height="100%">
  <!-- GEOMETRIC EMBLEM -->
  <g transform="translate(15, 12)">
    <!-- Main Outer Intersecting Ring (The Structure) -->
    <circle cx="38" cy="38" r="34" fill="none" stroke="#25Aae1" stroke-width="7" />
    
    <!-- Triangle wedge: Maintained original size/arc weight, rotated safely into the upper-right open quadrant -->
    <path d="M 38,38 L 74.7,28.2 A 38,38 0 0,0 47.8,1.3 Z" fill="#F15A24" />
    
    <!-- Clean Node Accents (Perfect circles mapping the grid intersections) -->
    <circle cx="38" cy="4" r="5" fill="#111827" />
    <circle cx="72" cy="38" r="5" fill="#111827" />
    <circle cx="38" cy="72" r="5" fill="#111827" />
    <circle cx="4" cy="38" r="5" fill="#111827" />
    
    <!-- Core Center Hub Connection -->
    <circle cx="38" cy="38" r="4" fill="#ffffff" />
  </g>

  <!-- BRAND LOGO TYPOGRAPHY TEXT -->
  <text x="115" y="52" font-family="'Lucida Sans', 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="#111827" letter-spacing="0.5">
    Franky<tspan fill="#F15A24" font-weight="400">HR</tspan>
  </text>
  
  <!-- Subtle Subtitle to lock it into the HRIS Dashboard ecosystem -->
  <text x="118" y="72" font-family="'Lucida Sans', sans-serif" font-size="12" font-weight="600" fill="#4C516D" letter-spacing="3">
    EMPLOYEE DIRECTORY
  </text>
</svg>
