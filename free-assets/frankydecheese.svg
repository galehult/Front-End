<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 140" width="100%" height="100%">
  <!-- GOURMET ISOMETRIC LINEAR CHEESE EMBLEM -->
  <g transform="translate(15, 15)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    
    <!-- 1. THE TOP PLANE (Tech Blue Outlines & Inner Holes) -->
    <path d="M 60,15 L 115,45 L 60,70 L 5,40 Z" stroke="#25Aae1" stroke-width="4.5" />
    <ellipse cx="40" cy="30" rx="9" ry="5" stroke="#25Aae1" stroke-width="3" transform="rotate(-15, 40, 30)" />
    <ellipse cx="75" cy="35" rx="7" ry="4" stroke="#25Aae1" stroke-width="3" transform="rotate(15, 75, 35)" />
    <circle cx="60" cy="52" r="5" stroke="#25Aae1" stroke-width="3" />
    <path d="M 85,28.5 A 10,10 0 0,1 98,35.5" stroke="#25Aae1" stroke-width="4.5" fill="none" />

    <!-- 2. FRONT-LEFT PLANE (Geometric Orange Outlines & Inner Holes) -->
    <path d="M 5,40 L 60,70 L 60,110 L 5,80 Z" stroke="#F15A24" stroke-width="4.5" />
    <circle cx="25" cy="62" r="7.5" stroke="#F15A24" stroke-width="3" />
    <circle cx="45" cy="85" r="5" stroke="#F15A24" stroke-width="3" />
    <path d="M 20,88 A 12,12 0 0,1 40,99" stroke="#F15A24" stroke-width="4.5" fill="none" />
    <path d="M 5,52 A 8,8 0 0,0 5,68" stroke="#F15A24" stroke-width="4.5" fill="none" />

    <!-- 3. FRONT-RIGHT PLANE (Tech Blue Outlines & Inner Holes) -->
    <path d="M 60,70 L 115,45 L 115,85 L 60,110 Z" stroke="#25Aae1" stroke-width="4.5" />
    <circle cx="92" cy="70" r="8" stroke="#25Aae1" stroke-width="3" />
    <circle cx="75" cy="92" r="6" stroke="#25Aae1" stroke-width="3" />
    <path d="M 115,58 A 8,8 0 0,0 115,74" stroke="#25Aae1" stroke-width="4.5" fill="none" />

    <!-- 4. INNER STRUCTURE -->
    <path d="M 5,80 L 60,55 L 115,85" stroke="#25Aae1" stroke-width="1.5" opacity="0.4" />
    <path d="M 60,15 L 60,55" stroke="#25Aae1" stroke-width="1.5" opacity="0.4" />

    <!-- 5. CENTRAL ANCHOR NODE -->
    <circle cx="60" cy="70" r="9" fill="#F15A24" stroke="#F15A24" stroke-width="1" />
  </g>

  <!-- BRAND LOGO TYPOGRAPHY TEXT (Perfect One-Liner Alignment - No Subtitles!) -->
  <text x="155" y="72" font-family="'Lucida Sans', 'Segoe UI', sans-serif" font-size="36" font-weight="800" fill="#111827" letter-spacing="0.5">
    Franky<tspan fill="#F15A24" font-weight="400">DeCheese</tspan>
  </text>
</svg>
