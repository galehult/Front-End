<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="test.css">
    <script src="test.js" defer></script>
    <title>To-Do App</title>
</head>
<body>
    <main>
        <img id="img-header" src="/frontend-mentor/todo-app-main/images/bg-desktop-light.jpg">
        <div id="todo" class="todo-card">
            <h1>TODO</h1>
            <div class="input-container">
                <input type="radio" id="todo-add" name="todo" value="complete">
                <input type="text" class="todo-input">
            </div>
            <div class="todo-container">
                <div class="todo-items"></div>
                <div class="filters-flex">
                    <div class="total-items">
                        <p><span class="total-items">0</span> items left</p>
                    </div>
                    <div class="filters">
                        <button class="filter-btn">All</button>
                        <button class="filter-btn">Active</button>
                        <button class="filter-btn">Completed</button>
                    </div>
                    <div class="clear-completed">
                        <button class="filter-btn">Clear Completed</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
